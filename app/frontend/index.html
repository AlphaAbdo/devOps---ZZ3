<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISIMA Pixel War 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.2rem;
      letter-spacing: 0.2em;
      margin-bottom: 14px;
      color: #c9d1d9;
      text-transform: uppercase;
    }

    #status-bar {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 10px;
      min-height: 1em;
    }

    #toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
      justify-content: center;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border: 2px solid transparent;
      border-radius: 3px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .swatch:hover { transform: scale(1.2); }
    .swatch.selected { border-color: #fff; transform: scale(1.25); }

    #canvas-wrap {
      overflow: auto;
      max-width: 100vw;
      max-height: 70vh;
      border: 1px solid #333;
      border-radius: 4px;
    }

    #grid {
      display: grid;
      /* columns set dynamically */
      gap: 0px;
      cursor: crosshair;
      user-select: none;
    }

    .cell {
      width: 12px;
      height: 12px;
      background: #ffffff;
    }
    .cell:hover { opacity: 0.75; }

    #coords {
      margin-top: 8px;
      font-size: 0.7rem;
      color: #555;
      height: 1em;
    }
  </style>
</head>
<body>
  <h1>Pixel War — ISIMA 2026</h1>
  <div id="status-bar">connecting…</div>

  <div id="toolbar"></div>

  <div id="canvas-wrap">
    <div id="grid"></div>
  </div>

  <div id="coords"></div>

  <script src="app.js"></script>
</body>
</html>
