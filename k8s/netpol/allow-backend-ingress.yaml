---
# le frontend nginx proxie /api et /ws vers le backend
# on autorise aussi Prometheus (namespace monitoring) pour le scrape /metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
  namespace: pixelwar
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
  ingress:
    # trafic depuis les pods frontend (nginx reverse-proxy)
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - port: 3000

    # scrape Prometheus depuis le namespace monitoring
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 3000
